
spring:
  application:
    name: CloudAppMLProject
  datasource:
    url: jdbc:postgresql://localhost:5432/app-db
    username: ${DB_USERNAME}
    password: ${DB_PWD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

minio:
  access:
    name: minioadmin
    secret: minioadmin
  url: //127.0.0.1:9000
  buckets:
    - name: ml-models
    - name: dataset-files

server:
  port: 8080
