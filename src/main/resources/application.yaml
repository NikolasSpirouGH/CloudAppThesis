rsa:
  private:
    key-location: classpath:keys/private_key.pem
  public:
    key-location: classpath:keys/public_key.pem
jwt:
  expirationMs: 3600000  # token expiration time in milliseconds (e.g., 1 hour)

servlet:
  multipart:
    max-file-size: 20MB
    max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

minio:
  access:
    name: minioadmin
    secret: minioadmin
  url: http://127.0.0.1:9000
  bucket:
    name: ml-models


server:
  port: 8080
