
spring:
  application:
    name: CloudAppMLProject
  datasource:
    url: jdbc:postgresql://localhost:5432/app-db
    username: ${DB_USERNAME}
    password: ${DB_PWD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.backend.mlapp: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level){yellow} %clr([%15.15thread]){magenta} %clr(%logger{36}){cyan} - %clr(%msg%n){black}"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/myapp.log

minio:
  access:
    name: minioadmin
    secret: minioadmin
  url: //127.0.0.1:9000
  bucket:
    name: ml-models

server:
  port: 8080
