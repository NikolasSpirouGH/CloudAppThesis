
spring:
  application:
    name: CloudAppMLProject
  datasource:
    url: jdbc:postgresql://localhost:5432/app-db?useUnicode=true&characterEncoding=UTF-8
    username: postgres
    password: 1996
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

