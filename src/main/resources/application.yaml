
spring:
  application:
    name: CloudAppMLProject
  datasource:
    url: jdbc:postgresql://localhost:5432/app-db?useUnicode=true&characterEncoding=UTF-8
    username: postgres
    password: 1996
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

rsa:
  private:
    key-location: classpath:keys/private_key.pem
  public:
    key-location: classpath:keys/public_key.pem
jwt:
  expirationMs: 3600000  # token expiration time in milliseconds (e.g., 1 hour)

servlet:
  multipart:
    max-file-size: 20MB
    max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

minio:
  access:
    name: minioadmin
    secret: minioadmin
  url: http://127.0.0.1:9000
  bucket:
    datasets: ml-models
    models: ml-models
    predictions: ml-predictions


server:
  port: 8080
